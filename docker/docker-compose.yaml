# TIP: Create a docker-compose.yaml file to set up your database and vector store services.
# Make sure to define the necessary services (e.g., MongoDB, Qdrant), ports, volumes, and networks.

version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile 
    container_name: fastapi
    ports:
      - "8000:8000"
    volumes:
      - ../src:/app  
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - mongodb
      - qdrant
    restart: unless-stopped

  mongodb:
    image: mongo:latest 
    container_name: mongo
    ports:
      - "27017:27017" 
    volumes:
      - mongo_data:/data/db 
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest 
    container_name: qdrant
    ports:
      - "6333:6333" 
      - "6334:6334" 
    volumes:
      - qdrant_data:/qdrant/storage 
    restart: unless-stopped

volumes:
  mongo_data:
  qdrant_data:
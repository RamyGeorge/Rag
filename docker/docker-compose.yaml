# TIP: Create a docker-compose.yaml file to set up your database and vector store services.
# Make sure to define the necessary services (e.g., MongoDB, Qdrant), ports, volumes, and networks.
# Api key ommited so not to get stolen or get token drain mn web scrapers
# add the follwoing at line 21 belowe QDRANT_PORT and above Volumes: --->  (- GROQ_API_KEY=gsk_YOU_API_KEY_THAT_START_WITH_GSK)

version: '3.8'

services:
  app:
    build:
      context: ../src
      dockerfile: ../docker/Dockerfile
    container_name: fastapi
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB_NAME=rag
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - GROQ_API_KEY=
    volumes:
      - ../src/assets:/app/assets  
    depends_on:
      - mongodb
      - qdrant
    restart: unless-stopped

  mongodb:
    image: mongo:latest 
    container_name: mongo
    ports:
      - "27017:27017" 
    volumes:
      - mongo_data:/data/db 
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest 
    container_name: qdrant
    ports:
      - "6333:6333" 
      - "6334:6334" 
    volumes:
      - qdrant_data:/qdrant/storage 
    restart: unless-stopped

volumes:
  mongo_data:
  qdrant_data: